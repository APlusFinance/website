    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const loading = document.getElementById("__bundler_loading");
        function setStatus(msg) {
          if (loading) loading.textContent = msg;
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener(
          "error",
          function (e) {
            var p = document.body || document.documentElement;
            var d =
              document.getElementById("__bundler_err") ||
              p.appendChild(document.createElement("div"));
            d.id = "__bundler_err";
            d.style.cssText =
              "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
            d.textContent =
              (d.textContent ? d.textContent + String.fromCharCode(10) : "") +
              "[bundle] " +
              (e.message || e.type) +
              (e.filename
                ? " (" + e.filename.slice(0, 60) + ":" + e.lineno + ")"
                : "");
          },
          true,
        );

        try {
          const manifestEl = document.querySelector(
            'script[type="__bundler/manifest"]',
          );
          const templateEl = document.querySelector(
            'script[type="__bundler/template"]',
          );
          if (!manifestEl || !templateEl) {
            setStatus("Error: missing bundle data");
            console.error(
              "[bundler] Missing script tags — manifestEl:",
              !!manifestEl,
              "templateEl:",
              !!templateEl,
            );
            return;
          }

          const manifest = JSON.parse(manifestEl.textContent);
          let template = JSON.parse(templateEl.textContent);

          const uuids = Object.keys(manifest);
          setStatus("Unpacking " + uuids.length + " assets...");

          const blobUrls = {};
          await Promise.all(
            uuids.map(async (uuid) => {
              const entry = manifest[uuid];
              try {
                const binaryStr = atob(entry.data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++)
                  bytes[i] = binaryStr.charCodeAt(i);

                let finalBytes = bytes;
                if (entry.compressed) {
                  if (typeof DecompressionStream !== "undefined") {
                    const ds = new DecompressionStream("gzip");
                    const writer = ds.writable.getWriter();
                    const reader = ds.readable.getReader();
                    writer.write(bytes);
                    writer.close();
                    const chunks = [];
                    let totalLen = 0;
                    while (true) {
                      const { done, value } = await reader.read();
                      if (done) break;
                      chunks.push(value);
                      totalLen += value.length;
                    }
                    finalBytes = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                      finalBytes.set(chunk, offset);
                      offset += chunk.length;
                    }
                  } else {
                    console.warn(
                      "DecompressionStream not available, asset " +
                        uuid +
                        " may not render",
                    );
                  }
                }

                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([finalBytes], { type: entry.mime }),
                );
              } catch (err) {
                console.error("Failed to decode asset " + uuid + ":", err);
                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([], { type: entry.mime }),
                );
              }
            }),
          );

          const extResEl = document.querySelector(
            'script[type="__bundler/ext_resources"]',
          );
          const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
          const resourceMap = {};
          for (const entry of extResources) {
            if (blobUrls[entry.uuid])
              resourceMap[entry.id] = blobUrls[entry.uuid];
          }

          setStatus("Rendering...");
          for (const uuid of uuids)
            template = template.split(uuid).join(blobUrls[uuid]);

          // Strip integrity + crossorigin — blob URLs from a file:// document inherit
          // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
          // The manifest bytes are ours; SRI protects against CDN compromise, not this.
          template = template
            .replace(/\s+integrity="[^"]*"/gi, "")
            .replace(/\s+crossorigin="[^"]*"/gi, "");

          const resourceScript =
            "<script>window.__resources = " +
            JSON.stringify(resourceMap)
              .split("</" + "script>")
              .join("<\\/" + "script>") +
            ";</" +
            "script>";
          // Inject after <head> so the DOCTYPE stays first; prepending the script
          // would push the parser into quirks mode. DOMParser always emits a <head>
          // (synthesizing one if the source HTML omitted it) but may carry
          // attributes through, so match the full opening tag. slice() rather than
          // replace() keeps us clear of $-pattern substitution in resourceScript.
          const headOpen = template.match(/<head[^>]*>/i);
          if (headOpen) {
            const i = headOpen.index + headOpen[0].length;
            template =
              template.slice(0, i) + resourceScript + template.slice(i);
          }

          // Parse the template and swap the root element. Scripts inserted via
          // DOMParser/replaceWith are inert per spec — re-create each with
          // createElement so they execute, awaiting onload for src scripts to
          // preserve ordering (React before ReactDOM before Babel before text/babel).
          const doc = new DOMParser().parseFromString(template, "text/html");
          document.documentElement.replaceWith(doc.documentElement);
          const dead = Array.from(document.scripts);
          for (const old of dead) {
            const s = document.createElement("script");
            for (const a of old.attributes) s.setAttribute(a.name, a.value);
            s.textContent = old.textContent;
            // text/babel scripts with a src: fetch and inline. transformScriptTags
            // does XHR against the src, but blob:null/ from a file:// origin is
            // silently dropped. Inlining makes it a plain inline babel script,
            // which transformScriptTags handles unconditionally.
            if ((s.type === "text/babel" || s.type === "text/jsx") && s.src) {
              const r = await fetch(s.src);
              s.textContent = await r.text();
              s.removeAttribute("src");
            }
            const p = s.src
              ? new Promise(function (r) {
                  s.onload = s.onerror = r;
                })
              : null;
            old.replaceWith(s);
            if (p) await p;
          }
          // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
          // which fired before we swapped the document. Trigger manually if present.
          if (
            window.Babel &&
            typeof window.Babel.transformScriptTags === "function"
          ) {
            window.Babel.transformScriptTags();
          }
        } catch (err) {
          setStatus("Error unpacking: " + err.message);
          console.error("Bundle unpack error:", err);
        }
      });
    </script>

ight: .9;\n    color: #fff; text-transform: uppercase;\n    margin-bottom: 36px;\n  }\n  .hero-h em { font-style: normal; color: #E4F4E9; }\n  .hero-sub {\n    font-size: clamp(14px, 1.4vw, 17px);\n    color: rgba(255,255,255,.86);\n    max-width: 520px; margin: 0 auto 52px;\n    line-height: 1.75; font-weight: 400;\n  }\n  .hero-ctas {\n    display: flex; gap: 14px;\n    justify-content: center; flex-wrap: wrap;\n    margin-bottom: 96px;\n  }\n  /* stats strip */\n  .hero-stats {\n    display: grid; grid-template-columns: repeat(4,1fr);\n    gap: 1px; background: rgba(255,255,255,.05);\n    border: 1px solid rgba(255,255,255,.05);\n    max-width: 840px; margin: 0 auto;\n  }\n  .stat-cell { background: #111110; padding: 28px 20px; text-align: center; }\n  .stat-v {\n    font-size: clamp(22px,3vw,34px); font-weight: 700;\n    letter-spacing: -.03em; color: #fff; line-height: 1;\n    margin-bottom: 8px;\n  }\n  .stat-l {\n    font-size: 10px; color: rgba(255,255,255,.62);\n    letter-spacing: .1em; text-transform: uppercase; line-height: 1.45;\n  }\n  /* scroll hint */\n  #scroll-hint {\n    position: absolute; bottom: 40px; left: 50%;\n    transform: translateX(-50%);\n    display: flex; flex-direction: column; align-items: center; gap: 10px;\n    z-index: 1;\n  }\n  #scroll-hint span {\n    font-size: 9px; font-weight: 700;\n    letter-spacing: .28em; text-transform: uppercase;\n    color: rgba(255,255,255,.55);\n  }\n  .sh-line {\n    width: 1px; height: 44px;\n    background: linear-gradient(to bottom, rgba(255,255,255,.18), transparent);\n    animation: shpulse 1.8s ease-in-out infinite;\n  }\n  @keyframes shpulse {\n    0%,100% { opacity: .25; transform: scaleY(1); }\n    50% { opacity: .8; transform: scaleY(.55) translateY(6px); }\n  }\n\n  /* ── Comparison table ── */\n  .cmp-wrap { overflow-x: auto; }\n  table.cmp {\n    width: 100%; border-collapse: collapse;\n    border: 1px solid rgba(255,255,255,.06);\n    min-width: 700px;\n  }\n  .cmp th {\n    padding: rap: wrap; gap: 8px;\n  }\n  .econ-box-hdr span:first-child {\n    font-size: 11px; font-weight: 700;\n    letter-spacing: .1em; text-transform: uppercase;\n    color: rgba(255,255,255,.86);\n  }\n  .econ-box-hdr span:last-child {\n    font-size: 10px; color: rgba(255,255,255,.55);\n    font-family: 'Geist Mono', monospace;\n  }\n  table.traj {\n    width: 100%; border-collapse: collapse; min-width: 540px;\n  }\n  .traj th {\n    padding: 12px 20px; text-align: left;\n    font-size: 9px; font-weight: 700;\n    letter-spacing: .18em; text-transform: uppercase;\n    color: rgba(255,255,255,.55);\n    border-bottom: 1px solid rgba(255,255,255,.05);\n  }\n  .traj td {\n    padding: 17px 20px;\n    border-bottom: 1px solid rgba(255,255,255,.04);\n    font-size: 13px; color: rgba(255,255,255,.86);\n  }\n  .traj tr:last-child td {\n    color: #E4F4E9; font-weight: 600;\n    background: rgba(228,244,233,.04);\n    border-left: 1px solid rgba(228,244,233,.25);\n  }\n\n  /* ── Cards grid ── */\n  .cards {\n    display: grid; grid-template-columns: repeat(3,1fr);\n    gap: 1px; background: rgba(255,255,255,.05);\n    border: 1px solid rgba(255,255,255,.05);\n  }\n  .crd {\n    background: #1e1e1d; padding: 36px 30px;\n    transition: background .2s;\n  }\n  .crd:hover { background: #272726; }\n  .crd-num {\n    font-size: 10px; font-weight: 700;\n    letter-spacing: .24em; color: rgba(255,255,255,.15);\n    margin-bottom: 28px;\n    font-family: 'Geist Mono', monospace;\n  }\n  .crd-title {\n    font-size: 15px; font-weight: 700;\n    color: #fff; margin-bottom: 12px;\n    letter-spacing: -.01em;\n  }\n  .crd-body {\n    font-size: 13px; color: rgba(255,255,255,.86);\n    line-height: 1.72;\n  }\n  .crd-tag {\n    display: inline-block; margin-top: 20px;\n    padding: 3px 10px; font-size: 9px; font-weight: 700;\n    letter-spacing: .14em; text-transform: uppercase;\n    color: #E4F4E9; border: 1px solid rgba(228,244,233,.28);\n  }\n\n  /* ── Vision ── */\n  #vision {\n    padding: 160px 48px; text-align: center;\n    border-top: 1px solid rgba(255,255,255,.05);\n  }\n  .vis-q {\n    font-size: clamp(20px, 2.8vw, 30px);\n    font-weight: 500; color: rgba(255,255,255,.86);\n    line-height: 1.62; max-width: 900px; margin: 0 auto;\n    letter-spacing: -.012em;\n    transition: opacity .3s ease;\n  }\n  .vis-attr {\n    margin-top: 32px; font-size: 10px; font-weight: 700;\n    letter-spacing: .24em; text-transform: uppercase;\n    color: rgba(255,255,255,.55);\n    transition: opacity .3s ease;\n  }\n  .vis-dots {\n    display: flex; gap: 8px; justify-content: center;\n    margin-top: 52px;\n  }\n  .vis-dot {\n    width: 6px; height: 6px; border-radius: 3px;\n    background: rgba(255,255,255,.12); border: none; cursor: pointer;\n    transition: all .25s;\n  }\n  .vis-dot.on { width: 22px; background: #E4F4E9; }\n\n  /* ── CTA ── */\n  #cta {\n    padding: 160px 48px; text-align: center;\n    border-top: 1px solid rgba(255,255,255,.05);\n    position: relative; overflow: hidden;\n  }\n  #cta::before {\n    content: '';\n    position: absolute; inset: 0;\n    background: radial-gradient(ellipse 55% 55% at 50% 100%, rgba(228,244,233,.07), transparent);\n    pointer-events: none;\n  }\n  .cta-t {\n    font-size: clamp(52px, 8vw, 112px);\n    font-weight: 700; letter-spacing: -.04em; line-height: .93;\n    text-transform: uppercase; color: #fff;\n    margin-bottom: 40px;\n    position: relative; z-index: 1;\n  }\n  .cta-sub {\n    font-size: 15px; color: rgba(255,255,255,.7);\n    max-width: 480px; margin: 0 auto 52px;\n    line-height: 1.75; position: relative; z-index: 1;\n  }\n\n  /* ── Footer ── */\n  footer {\n    padding: 72px 48px 48px;\n    border-top: 1px solid rgba(255,255,255,.05);\n  }\n  .ft-inner { max-width: 1320px; margin: 0 auto; }\n  .ft-grid {\n    display: grid; grid-template-columns: 2fr 1fr 1fr;\n    gap: 64px; margin-bottom: 64px;\n  }\n  .ft-brand-txt {\n    font-size: 13px; color: rgba(255,255,255,.22);\n    line-height: 1.75; max-width: 280px; margin-top: 16px;\n  }\n  .ft-col-lbl {\n    font-size: 9px; font-weight: 700;\n    letter-spacing: .22em; text-transform: uppercase;\n    color: rgba(255,255,255,.55); margin-bottom: 20px;\n  }\n  .ft-lnk {\n    display: block; font-size: 13px;\n    color: rgba(255,255,255,.7); text-decoration: none;\n    margin-bottom: 12px; transition: color .15s;\n  }\n  .ft-lnk:hover { color: #fff; }\n  .ft-bot {\n    border-top: 1px solid rgba(255,255,255,.05);\n    padding-top: 24px;\n    display: flex; justify-content: space-between;\n    align-items: center; flex-wrap: wrap; gap: 12px;\n  }\n  .ft-copy { font-size: 12px; color: rgba(255,255,255,.55); }\n  .ft-live {\n    display: flex; align-items: center; gap: 7px;\n    font-size: 11px; font-weight: 700; color: #E4F4E9;\n  }\n  .live-dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: #E4F4E9;\n    animation: ldpulse 2s ease-in-out infinite;\n  }\n  @keyframes ldpulse {\n    0%,100% { opacity: 1; } 50% { opacity: .35; }\n  }\n\n  /* ── Responsive ── */\n  @media (max-width: 960px) {\n    .sec { padding: 90px 28px; }\n    #hero { padding: 110px 28px 90px; }\n    #vision, #cta { padding: 110px 28px; }\n    footer { padding: 56px 28px 40px; }\n    #hdr { padding: 0 18px; }\n    nav { gap: 24px; }\n    nav a:not(.nav-cta) { display: none; }\n    .cards { grid-template-columns: 1fr 1fr; }\n    .fee-grid { grid-template-columns: 1fr; }\n    .ft-grid { grid-template-columns: 1fr; gap: 36px; }\n  }\n  @media (max-width: 640px) {\n    .hero-stats { grid-template-columns: repeat(2,1fr); }\n    .cards { grid-template-columns: 1fr; }\n    nav { display: none; }\n    #sppct { display: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- Cursor dot -->\n<div id=\"cur\"><\u002Fdiv>\n\n<!-- Intro overlay -->\n<div id=\"intro\">\n  <div id=\"intro-line\">\n    <span id=\"intro-text\"><\u002Fspan><span id=\"intro-cursor\">_<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Background 3D lattice -->\n<canvas id=\"bg-lattice\"><\u002Fcanvas>\n\n<!-- Foreground cursor lattice -->\n<canvas id=\"lattice\"><\u002Fcanvas>\n\n<!-- Scroll bar -->\n<div id=\"spbar\"><\u002Fdiv>\n<div id=\"sppct\">0%<\u002Fdiv>\n\n<!-- ══ Header ═══════════════════════════════════════════════════════════════ -->\n<header id=\"hdr\">\n  <div class=\"hdr-inner\">\n    <a href=\"#\" class=\"wordmark\">\n      <img src=\"ec385f3b-14ee-4494-a2da-a91f014dfcc3\" alt=\"A+ Protocol\" style=\"height:30px; width:auto; display:block;\">\n      <span class=\"wordmark-label\">Protocol<\u002Fspan>\n    <\u002Fa>\n    <nav>\n      <a href=\"#why\">Why A+<\u002Fa>\n      <a href=\"#econ\">Economics<\u002Fa>\n      <a href=\"#banks\">For Banks<\u002Fa>\n      <a href=\"#vision\">Vision<\u002Fa>\n      <a href=\"https://forms.gle/Hp8wbAfzU4Um7U8e6\" target=\"_blank\" class=\"nav-cta\">Contact Us<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ══ Hero ══════════════════════════════════════════════════════════════════ -->\n<section id=\"hero\">\n  <div class=\"hero-inner\">\n    <div class=\"lbl rv\">The Bank-Native Stablecoin Network &nbsp;·&nbsp; GENIUS Act Compliant &nbsp;·&nbsp; Built on Ethereum<\u002Fdiv>\n    <h1 class=\"hero-h rv d1\"><em>A+ Network<\u002Fem><\u002Fh1>\n    <p class=\"hero-sub rv d2\">Every bank should be a node in the new financial network. A+ is the infrastructure for regulated institutions to issue <strong style=\"color:rgba(255,255,255,.7)\">$USDA+<\u002Fstrong> on Ethereum — and keep 100% of the yield.<\u002Fp>\n    <div class=\"hero-ctas rv d3\">\n      <a href=\"https://forms.gle/Hp8wbAfzU4Um7U8e6\" target=\"_blank\" class=\"btn-p\">\n        Apply for Access\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fa>\n      <a href=\"#why\" class=\"btn-s\">How It Compares<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"hero-stats rv d4\">\n      <div class=\"stat-cell\">\n        <div class=\"stat-v\">$312B<\u002Fdiv>\n        <div class=\"stat-l\">Stablecoin<br>Market<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-cell\">\n        <div class=\"stat-v\">85%<\u002Fdiv>\n        <div class=\"stat-l\">Controlled by<br>2 Firms<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-cell\">\n        <div class=\"stat-v\">~$35M<\u002Fdiv>\n        <div class=\"stat-l\">Yield per<br>$1B Issued<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-cell\">\n        <div class=\"stat-v\">4,000+<\u002Fdiv>\n        <div class=\"stat-l\">Community<br>Banks in US<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"scroll-hint\">\n    <span>Scroll<\u002Fspan>\n    <div class=\"sh-line\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ Comparison ════════════════════════════════════════════════════════════ -->\n<section id=\"why\" class=\"sec\">\n  <div class=\"sec-inner\">\n    <div class=\"sec-head rv\">\n      <div class=\"lbl g\">How A+ Compares<\u002Fdiv>\n      <h2 class=\"sec-title\">The Only Architecture<br>That Solves Both<br>Problems At Once.<\u002Fh2>\n      <p class=\"sec-desc\">Yield without fragmentation. Compliance without compromise.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"cmp-wrap rv d1\">\n      <table class=\"cmp\">\n        <thead>\n          <tr>\n            <th style=\"width:150px;\">Model<\u002Fth>\n            <th>Economics<\u002Fth>\n            <th>Brand<\u002Fth>\n            <th>Liquidity<\u002Fth>\n            <th>Stake<\u002Fth>\n            <th>Risk Model<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td>Circle / Tether<\u002Ftd>\n            <td>No reserve yield. May pay fees.<\u002Ftd>\n            <td>You distribute their brand.<\u002Ftd>\n            <td>High<\u002Ftd>\n            <td>None<\u002Ftd>\n            <td>Concentration risk. Opaque.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td>Bank Built<\u002Ftd>\n            <td>100% yield — on a very small pie.<\u002Ftd>\n            <td>Limited to bank recognition.<\u002Ftd>\n            <td>Isolated.<\u002Ftd>\n            <td>All of small pie<\u002Ftd>\n            <td>Full operational burden.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td>White-Label<\u002Ftd>\n            <td>Revenue share + platform fees.<\u002Ftd>\n            <td>Limited to issuer recognition.<\u002Ftd>\n            <td>Fragmented.<\u002Ftd>\n            <td>None<\u002Ftd>\n            <td>Vendor dependency.<\u002Ftd>\n          <\u002Ftr>\n          <tr class=\"hi\">\n            <td>A+ <span class=\"live-badge\">Live<\u002Fspan><\u002Ftd>\n            <td>100% reserve yield. Economies of scale.<\u002Ftd>\n            <td>Co-branded: A+ BankName<\u002Ftd>\n            <td>High. Cross-bank fungibility.<\u002Ftd>\n            <td>Shared Ownership<\u002Ftd>\n            <td>Distributed across regulated members.<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ Economics ═════════════════════════════════════════════════════════════ -->\n<section id=\"econ\" class=\"sec\">\n  <div class=\"sec-inner\">\n    <div class=\"sec-head rv\">\n      <div class=\"lbl g\">Economics<\u002Fdiv>\n      <h2 class=\"sec-title\">A Network That<br>Pays For Itself.<\u002Fh2>\n      <p class=\"sec-desc\">Three revenue streams. All outcomes-based — A+ earns only when banks issue.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"fee-grid rv d1\">\n      <div class=\"fee-card\">\n        <div class=\"fee-top\">\n          <div class=\"fee-name\">Onboarding Fee<\u002Fdiv>\n          <div class=\"fee-rate\">$100k one-time<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fee-body\">Per bank. Covers GENIUS Act § 4 &amp; § 5 regulatory setup, AML/BSA integration, reserve management system, and smart-contract compliance primitives.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fee-card\">\n        <div class=\"fee-top\">\n          <div class=\"fee-name\">Redemption Fee<\u002Fdiv>\n          <div class=\"fee-rate\">5 bps<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fee-body\">Charged to bank on burn, not customer. Aligned with Circle's ~5 bps structure. 30% annual redemption rate applied to outstanding supply.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fee-card\">\n        <div class=\"fee-top\">\n          <div class=\"fee-name\">Security Fee<\u002Fdiv>\n          <div class=\"fee-rate\">0 → 15 bps<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fee-body\">Annual clip on reserves. Ramps from 0 at launch to 15 bps by Year 9. Covers ongoing compliance, monthly attestations, and sanctions screening.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"econ-box rv d2\">\n      <div class=\"econ-box-hdr\">\n        <span>Growth Trajectory — Base Case<\u002Fspan>\n        <span>Conservative / Base / Aggressive at Year 9: $811M / $1.14B / $1.74B ARR<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"overflow-x:auto;\">\n        <table class=\"traj\">\n          <thead>\n            <tr><th>Period<\u002Fth><th>Banks<\u002Fth><th>TVL<\u002Fth><th>ARR<\u002Fth><th>Note<\u002Fth><\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr><td>At Launch<\u002Ftd><td>25<\u002Ftd><td>$28B<\u002Ftd><td>$6.3M<\u002Ftd><td>25 launch banks; redemption fees only<\u002Ftd><\u002Ftr>\n            <tr><td>Year 3<\u002Ftd><td>400<\u002Ftd><td>$234B<\u002Ftd><td>$107M<\u002Ftd><td>$100M ARR crossed; security fee begins<\u002Ftd><\u002Ftr>\n            <tr><td>Year 5<\u002Ftd><td>1,425<\u002Ftd><td>$443B<\u002Ftd><td>$290M<\u002Ftd><td>Network scaling; 1,425 banks<\u002Ftd><\u002Ftr>\n            <tr><td>Year 9<\u002Ftd><td>1,500<\u002Ftd><td>$692B<\u002Ftd><td>$1.14B<\u002Ftd><td>Security fee at 15 bps; mature run-rate<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- GSIB callout -->\n    <div style=\"margin-top:2px; padding:24px 28px; border:1px solid rgba(228,244,233,.18); background:rgba(228,244,233,.04); display:flex; flex-wrap:wrap; gap:32px; align-items:center;\" class=\"rv d3\">\n      <div style=\"flex:1; min-width:200px;\">\n        <div class=\"lbl g\" style=\"margin-bottom:8px;\">GSIB Example — Year 9<\u002Fdiv>\n        <p style=\"font-size:13px; color: rgba(255,255,255,.86); line-height:1.65;\">One large bank with $40B USDA+ supply earns <strong style=\"color:rgba(255,255,255,.7)\">$1.33B net annually<\u002Fstrong> — after all A+ fees ($66M). Gross reserve yield at 3.49% blended = $1.40B. A+ takes 4.7%.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:40px; flex-wrap:wrap;\">\n        <div style=\"text-align:center;\">\n          <div style=\"font-size:28px; font-weight:700; letter-spacing:-.03em; color:#fff;\">$1.40B<\u002Fdiv>\n          <div style=\"font-size:10px; color: rgba(255,255,255,.62); margin-top:5px; letter-spacing:.1em; text-transform:uppercase;\">Gross Yield<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <div style=\"font-size:28px; font-weight:700; letter-spacing:-.03em; color: rgba(255,255,255,.86);\">$66M<\u002Fdiv>\n          <div style=\"font-size:10px; color: rgba(255,255,255,.62); margin-top:5px; letter-spacing:.1em; text-transform:uppercase;\">A+ Fees (4.7%)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <div style=\"font-size:28px; font-weight:700; letter-spacing:-.03em; color:#E4F4E9;\">$1.33B<\u002Fdiv>\n          <div style=\"font-size:10px; color: rgba(255,255,255,.62); margin-top:5px; letter-spacing:.1em; text-transform:uppercase;\">Net to Bank<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ For Banks ══════════════════════════════════════════════════════════════ -->\n<section id=\"banks\" class=\"sec\">\n  <div class=\"sec-inner\">\n    <div class=\"sec-head rv\">\n      <div class=\"lbl g\">For Banks<\u002Fdiv>\n      <h2 class=\"sec-title\">Why Regulated<br>Banks Join A+.<\u002Fh2>\n      <p class=\"sec-desc\">The economics are straightforward. The coordination is the moat.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"cards\">\n      <div class=\"crd rv\">\n        <div class=\"crd-num\">01<\u002Fdiv>\n        <div class=\"crd-title\">100% Reserve Yield<\u002Fdiv>\n        <div class=\"crd-body\">At $1B in issuance, a participating bank earns ~$35M in annual yield at a 3.49% blended rate — with zero new lending risk. Circle earns $2.7B/yr and passes none of it to sourcing banks.<\u002Fdiv>\n        <div class=\"crd-tag\">$35M / $1B issued<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"crd rv d1\">\n        <div class=\"crd-num\">02<\u002Fdiv>\n        <div class=\"crd-title\">No Bank Builds Alone<\u002Fdiv>\n        <div class=\"crd-body\">Every bank wants a stablecoin strategy. None want to build it alone. A+ fills that gap: shared compliance, shared infrastructure, shared brand — without surrendering your balance sheet.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"crd rv d2\">\n        <div class=\"crd-num\">03<\u002Fdiv>\n        <div class=\"crd-title\">Fits Existing Frameworks<\u002Fdiv>\n        <div class=\"crd-body\">No new charter, no new regulatory status. The AML program, sanctions screening, monthly attestations, and reserve reporting are all handled by shared A+ infrastructure from day one.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"crd rv d1\">\n        <div class=\"crd-num\">04<\u002Fdiv>\n        <div class=\"crd-title\">Freeze Compliance, Handled<\u002Fdiv>\n        <div class=\"crd-body\">GENIUS Act § 4(a)(6)(B) requires live freeze capability before minting a single token. A+ provides the smart-contract primitives, Treasury coordination API, and full audit trail — so banks never build this alone.<\u002Fdiv>\n        <div class=\"crd-tag\">GENIUS Act §4<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"crd rv d2\">\n        <div class=\"crd-num\">05<\u002Fdiv>\n        <div class=\"crd-title\">Shared Liquidity<\u002Fdiv>\n        <div class=\"crd-body\">Every white-label stablecoin fragments liquidity. Every single-issuer coin concentrates risk. A+ is the only architecture with one unified coin, cross-bank fungibility, and full member yield.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"crd rv d3\">\n        <div class=\"crd-num\">06<\u002Fdiv>\n        <div class=\"crd-title\">GENIUS Act Ready<\u002Fdiv>\n        <div class=\"crd-body\">The GENIUS Act sets the legal framework for bank-issued stablecoins. A+ provides the architecture. Regulated institutions can participate from day one with a compliant, auditable stack.<\u002Fdiv>\n        <div class=\"crd-tag\">Live on Ethereum<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ Vision ════════════════════════════════════════════════════════════════ -->\n<section id=\"vision\">\n  <div style=\"max-width:960px; margin:0 auto; text-align:center; padding:0 48px;\">\n    <div class=\"lbl rv\" style=\"text-align:center;\">Vision<\u002Fdiv>\n    <div id=\"vq\" class=\"vis-q rv d1\">\"Visa built a network where every bank could issue its own card and every merchant accepted them all. A+ is doing the same thing for digital dollars.\"<\u002Fdiv>\n    <div id=\"va\" class=\"vis-attr rv d2\">— A+ Vision<\u002Fdiv>\n    <div class=\"vis-dots rv d3\">\n      <button class=\"vis-dot on\" data-i=\"0\"><\u002Fbutton>\n      <button class=\"vis-dot\" data-i=\"1\"><\u002Fbutton>\n      <button class=\"vis-dot\" data-i=\"2\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ CTA ═══════════════════════════════════════════════════════════════════ -->\n<section id=\"cta\">\n  <div style=\"position:relative; z-index:1; max-width:900px; margin:0 auto;\">\n    <div class=\"lbl g rv\" style=\"text-align:center; margin-bottom:28px;\">Join the Network<\u002Fdiv>\n    <h2 class=\"cta-t rv d1\">Ready to<br>Become a Node?<\u002Fh2>\n    <p class=\"cta-sub rv d2\">There are over 4,000 community banks in the US watching $6.6 trillion in deposits move toward digital rails. A+ gives you a seat at the table.<\u002Fp>\n    <div class=\"rv d3\" style=\"position:relative; z-index:1;\">\n      <a href=\"https://forms.gle/Hp8wbAfzU4Um7U8e6\" target=\"_blank\" class=\"btn-p\">\n        Contact Us\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ Footer ════════════════════════════════════════════════════════════════ -->\n<footer>\n  <div class=\"ft-inner\">\n    <div class=\"ft-grid\">\n      <div>\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <img src=\"ec385f3b-14ee-4494-a2da-a91f014dfcc3\" alt=\"A+ Protocol\" style=\"height:24px; width:auto; opacity:.45; display:block;\">\n          <span style=\"font-size:9px; font-weight:500; color: rgba(255,255,255,.55); letter-spacing:.14em; text-transform:uppercase;\">Protocol<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"ft-brand-txt\">Neutral, shared infrastructure for regulated banks to issue $USDA+ on Ethereum.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"ft-col-lbl\">Navigation<\u002Fdiv>\n        <a href=\"#why\" class=\"ft-lnk\">Why A+<\u002Fa>\n        <a href=\"#econ\" class=\"ft-lnk\">Economics<\u002Fa>\n        <a href=\"#banks\" class=\"ft-lnk\">For Banks<\u002Fa>\n        <a href=\"#vision\" class=\"ft-lnk\">Vision<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <div class=\"ft-col-lbl\">Get In Touch<\u002Fdiv>\n        <p style=\"font-size:13px; color:rgba(255,255,255,.22); line-height:1.7; margin-bottom:20px;\">Interested in joining the A+ network as an issuing bank?<\u002Fp>\n        <a href=\"https://forms.gle/Hp8wbAfzU4Um7U8e6\" target=\"_blank\" class=\"btn-p\" style=\"font-size:10px; padding:10px 20px;\">Contact Us<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ft-bot\">\n      <div class=\"ft-copy\">© 2025 A+ Protocol. All rights reserved.<\u002Fdiv>\n      <div class=\"ft-live\"><div class=\"live-dot\"><\u002Fdiv>$USDA+ Live on Ethereum<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ══ Scripts ════════════════════════════════════════════════════════════════ -->\n<script>\n(function () {\n  // ── Background 3D lattice ─────────────────────────────────────────────────\n  (function () {\n    const bgCanvas = document.getElementById('bg-lattice');\n    const bgCtx    = bgCanvas.getContext('2d');\n\n    function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }\n    resizeBg();\n    window.addEventListener('resize', resizeBg);\n\n    const FOV        = 720;\n    const SPEED      = 0.28;   // faster drift\n    const RY = 0.00055;\n    const RX = 0.00025;\n\n    // ── Full 3-D grid lattice ─────────────────────────────────────────────────\n    const STEP   = 120;\n    const EX = 8, EY = 6, EZ = 2;\n    const SPREAD = STEP * Math.max(EX, EY, EZ);\n    const CONNECT_3D = STEP * 1.5; // kept for compat — edges use pre-computed list\n\n    const nodes = [];\n    for (let ix = -EX; ix <= EX; ix++)\n      for (let iy = -EY; iy <= EY; iy++)\n        for (let iz = -EZ; iz <= EZ; iz++)\n          nodes.push({\n            ix, iy, iz,\n            x: ix*STEP + (Math.random()-.5)*6,\n            y: iy*STEP + (Math.random()-.5)*6,\n            z: iz*STEP + (Math.random()-.5)*6,\n            vx: (Math.random()-.5)*SPEED,\n            vy: (Math.random()-.5)*SPEED,\n            vz: (Math.random()-.5)*SPEED,\n          });\n\n    // Pre-compute neighbour edges once — O(n) draw per frame\n    const nodeMap = new Map();\n    nodes.forEach((n,i) => nodeMap.set(n.ix+','+n.iy+','+n.iz, i));\n    const edges = [];\n    nodes.forEach((n,i) => {\n      [[1,0,0],[0,1,0],[0,0,1]].forEach(([dx,dy,dz]) => {\n        const k = (n.ix+dx)+','+(n.iy+dy)+','+(n.iz+dz);\n        if (nodeMap.has(k)) edges.push([i, nodeMap.get(k)]);\n      });\n    });\n\n    // Accumulated rotation angles\n    let angY = 0, angX = 0;\n\n    // Rotate a point around Y then X\n    function rotate(x, y, z) {\n      // Y-axis\n      let cosY = Math.cos(angY), sinY = Math.sin(angY);\n      let rx = x * cosY + z * sinY;\n      let rz = -x * sinY + z * cosY;\n      // X-axis\n      let cosX = Math.cos(angX), sinX = Math.sin(angX);\n      let ry2 = y * cosX - rz * sinX;\n      let rz2 = y * sinX + rz * cosX;\n      return [rx, ry2, rz2];\n    }\n\n    // Project 3D → 2D\n    function project(x, y, z) {\n      const d = FOV / (FOV + z + SPREAD); // z+SPREAD keeps z > 0\n      const cx = bgCanvas.width  / 2;\n      const cy = bgCanvas.height / 2;\n      return [cx + x * d, cy + y * d, d]; // d = scale (depth cue)\n    }\n\n    // Mouse parallax nudge\n    let mouseNudgeX = 0, mouseNudgeY = 0;\n    document.addEventListener('mousemove', e => {\n      mouseNudgeX = (e.clientX / window.innerWidth  - .5) * 0.00012;\n      mouseNudgeY = (e.clientY / window.innerHeight - .5) * 0.00006;\n    });\n\n    function bgFrame() {\n      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);\n\n      angY += RY + mouseNudgeX;\n      angX += RX + mouseNudgeY;\n\n      // Drift nodes + wrap\n      nodes.forEach(n => {\n        n.x += n.vx; n.y += n.vy; n.z += n.vz;\n        if (Math.abs(n.x) > SPREAD) n.vx *= -1;\n        if (Math.abs(n.y) > SPREAD) n.vy *= -1;\n        if (Math.abs(n.z) > SPREAD) n.vz *= -1;\n      });\n\n      // Project all\n      const proj = nodes.map(n => {\n        const [rx, ry, rz] = rotate(n.x, n.y, n.z);\n        return project(rx, ry, rz);\n      });\n\n      // Draw edges using pre-computed neighbour list\n      bgCtx.lineWidth = 0.9;\n      edges.forEach(([i,j])=>{\n        const pi=proj[i], pj=proj[j];\n        const da=(pi[2]+pj[2])*.5;\n        const a=(0.2+da*.5)*.65;\n        if(a<0.01) return;\n        bgCtx.strokeStyle='rgba(255,255,255,'+a.toFixed(3)+')';\n        bgCtx.beginPath();\n        bgCtx.moveTo(pi[0],pi[1]);\n        bgCtx.lineTo(pj[0],pj[1]);\n        bgCtx.stroke();\n      });\n\n      // Draw nodes\n      proj.forEach(([sx, sy, d]) => {\n        const a = 0.3 + d * 0.55;\n        const r = d * 3.5;\n        bgCtx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;\n        bgCtx.beginPath();\n        bgCtx.arc(sx, sy, r, 0, 6.283);\n        bgCtx.fill();\n      });\n\n      requestAnimationFrame(bgFrame);\n    }\n    bgFrame();\n  })();\n\n  // ── Intro typewriter (robust to hidden tabs / throttled rAF) ──────────────\n  (function() {\n    const el   = document.getElementById('intro-text');\n    const over = document.getElementById('intro');\n    const msg  = 'your stablecoin is upgrading';\n\n    function dismiss() {\n      if (!over.parentNode) return;\n      over.classList.add('out');\n      setTimeout(() => over.remove(), 750);\n    }\n\n    function fastForward() {\n      el.textContent = msg;\n      dismiss();\n    }\n\n    // If page loads hidden, skip the animation entirely\n    if (document.hidden) { fastForward(); return; }\n\n    const STEP = 55;        // ms per char\n    const startWall = Date.now();   // wall-clock fallback\n    let start = null, last = -1, done = false;\n\n    function tick(t) {\n      if (done) return;\n      if (start === null) start = t;\n      const idx = Math.min(msg.length, Math.floor((t - start) / STEP));\n      if (idx !== last) {\n        el.textContent = msg.slice(0, idx);\n        last = idx;\n      }\n      if (idx < msg.length) {\n        requestAnimationFrame(tick);\n      } else {\n        done = true;\n        setTimeout(dismiss, 700);\n      }\n    }\n    requestAnimationFrame(tick);\n\n    // Wall-clock failsafe: if rAF gets throttled (hidden/backgrounded tab)\n    // and we haven't completed by 2.5× the expected duration, fast-forward.\n    const expectedMs = msg.length * STEP + 700;\n    setTimeout(() => {\n      if (!done) {\n        done = true;\n        fastForward();\n      }\n    }, expectedMs * 2.5);\n\n    // Also dismiss the moment the user shows the page if it was hidden\n    document.addEventListener('visibilitychange', () => {\n      if (!document.hidden && !done) {\n        done = true;\n        fastForward();\n      }\n    });\n  })();\n\n  // ── Custom cursor ──────────────────────────────────────────────────────────\n  const cur = document.getElementById('cur');\n  document.addEventListener('mousemove', e => {\n    cur.style.left = e.clientX + 'px';\n    cur.style.top  = e.clientY + 'px';\n    cur.style.opacity = '1';\n  });\n  document.addEventListener('mouseleave', () => cur.style.opacity = '0');\n  document.querySelectorAll('a, button').forEach(el => {\n    el.addEventListener('mouseenter', () => { cur.style.width = '18px'; cur.style.height = '18px'; });\n    el.addEventListener('mouseleave', () => { cur.style.width = '7px'; cur.style.height = '7px'; });\n  });\n\n  // ── Lattice canvas ─────────────────────────────────────────────────────────\n  const canvas = document.getElementById('lattice');\n  const ctx    = canvas.getContext('2d');\n\n  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }\n  resize();\n  window.addEventListener('resize', resize);\n\n  // Particle: spawned in a grid, slowly disperses\n  function Particle(cx, cy, ox, oy) {\n    this.x = cx + ox;\n    this.y = cy + oy;\n    const len = Math.sqrt(ox*ox + oy*oy) || 1;\n    // drift radially outward + tiny noise\n    this.vx = (ox / len) * 0.14 + (Math.random() - .5) * .07;\n    this.vy = (oy / len) * 0.14 + (Math.random() - .5) * .07;\n    this.a  = .55 + Math.random() * .25;\n    this.da = .0018 + Math.random() * .0012;\n  }\n  Particle.prototype.tick = function() {\n    this.x  += this.vx;\n    this.y  += this.vy;\n    this.vx *= .985;\n    this.vy *= .985;\n    this.a  -= this.da;\n  };\n\n  let pts = [];\n  let lastT = 0, lastX = -999, lastY = -999;\n  const SPACING = 16;                  // gap between + arm nodes\n  const CONNECT  = 22;                 // px — connects only adjacent arm nodes\n\n  // Spawn particles in a + cross shape\n  function spawn(cx, cy) {\n    const ARM = 3;  // nodes each side from centre\n    for (let i = -ARM; i <= ARM; i++) {\n      pts.push(new Particle(cx, cy, i * SPACING, 0));          // horizontal\n      if (i !== 0) pts.push(new Particle(cx, cy, 0, i * SPACING)); // vertical\n    }\n  }\n\n  document.addEventListener('mousemove', e => {\n    const now = performance.now();\n    const dx = e.clientX - lastX, dy = e.clientY - lastY;\n    if (now - lastT > 55 && dx*dx + dy*dy > 144) {\n      spawn(e.clientX, e.clientY);\n      lastT = now; lastX = e.clientX; lastY = e.clientY;\n    }\n  });\n\n  function frame() {\n    ctx.clearRect(0, 0, canvas.width, canvas.height);\n\n    // cull dead\n    pts = pts.filter(p => p.a > 0);\n    if (pts.length > 700) pts.splice(0, pts.length - 700);\n    pts.forEach(p => p.tick());\n\n    // connections\n    ctx.lineWidth = 2.6;\n    for (let i = 0; i < pts.length; i++) {\n      const pi = pts[i];\n      for (let j = i + 1; j < pts.length; j++) {\n        const pj = pts[j];\n        const dx = pi.x - pj.x, dy = pi.y - pj.y;\n        const d2 = dx*dx + dy*dy;\n        if (d2 < CONNECT * CONNECT) {\n          const d = Math.sqrt(d2);\n          const a = Math.min(pi.a, pj.a) * (1 - d / CONNECT) * .75;\n          ctx.strokeStyle = `rgba(255,255,255,${a.toFixed(3)})`;\n          ctx.beginPath();\n          ctx.moveTo(pi.x, pi.y);\n          ctx.lineTo(pj.x, pj.y);\n          ctx.stroke();\n        }\n      }\n    }\n\n    // dots\n    pts.forEach(p => {\n      ctx.fillStyle = `rgba(255,255,255,${(p.a * .85).toFixed(3)})`;\n      ctx.beginPath();\n      ctx.arc(p.x, p.y, 3.0, 0, 6.283);\n      ctx.fill();\n    });\n\n    requestAnimationFrame(frame);\n  }\n  frame();\n\n  // ── Scroll progress ────────────────────────────────────────────────────────\n  const spbar = document.getElementById('spbar');\n  const sppct = document.getElementById('sppct');\n  const hdr   = document.getElementById('hdr');\n\n  window.addEventListener('scroll', () => {\n    const top = window.scrollY;\n    const max = document.documentElement.scrollHeight - window.innerHeight;\n    const p   = max > 0 ? (top / max) * 100 : 0;\n    spbar.style.width   = p + '%';\n    sppct.textContent   = Math.round(p) + '%';\n    hdr.classList.toggle('scrolled', top > 30);\n  }, { passive: true });\n\n  // ── Scroll reveal ──────────────────────────────────────────────────────────\n  const obs = new IntersectionObserver(entries => {\n    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); obs.unobserve(e.target); } });\n  }, { threshold: .1 });\n\n  document.querySelectorAll('.rv').forEach(el => obs.observe(el));\n\n  // Trigger hero immediately — no chained timeouts (avoids throttling races)\n  document.querySelectorAll('#hero .rv').forEach(el => el.classList.add('on'));\n\n  // ── Vision carousel ────────────────────────────────────────────────────────\n  const VQ = [\n    { q: '\"Visa built a network where every bank could issue its own card and every merchant accepted them all. A+ is doing the same thing for digital dollars.\"', a: '— A+ Vision' },\n    { q: '\"The right stablecoin should not come from outside the banking system. It should come from the banks themselves, working together on neutral infrastructure.\"', a: '— A+ Mission' },\n    { q: '\"Every bank wants a stablecoin strategy. None want to build it alone. A+ fills that gap — shared compliance, shared infrastructure, shared brand.\"', a: '— Danny Ryan, Co-founder' },\n  ];\n  let vi = 0;\n  const vq = document.getElementById('vq');\n  const va = document.getElementById('va');\n  const vdots = document.querySelectorAll('.vis-dot');\n\n  function setVQ(i) {\n    vi = i;\n    vq.style.opacity = va.style.opacity = '0';\n    setTimeout(() => {\n      vq.textContent = VQ[i].q;\n      va.textContent = VQ[i].a;\n      vq.style.opacity = va.style.opacity = '1';\n    }, 280);\n    vdots.forEach((d, idx) => d.classList.toggle('on', idx === i));\n  }\n  vq.style.transition = va.style.transition = 'opacity .28s ease';\n  vdots.forEach(d => d.addEventListener('click', () => setVQ(+d.dataset.i)));\n  setInterval(() => setVQ((vi + 1) % VQ.length), 5500);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
    </script>
